stages:
  - quality
  - build

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# -------------------------
# Compile Solidity using Node + Hardhat
# -------------------------
compile_solidity:
  stage: build
  image: node:18
  before_script:
    - node --version
    - npm --version
  script:
    - npm install --no-audit --no-fund --legacy-peer-deps
    - npx hardhat compile
    - mkdir -p build/solc
    # Copy ABIs and bytecode produced by Hardhat to build/solc for artifacts
    - cp -r src/artifacts/* build/solc/ || true
    - ls -la build/solc || true
  artifacts:
    expire_in: 14 days
    paths:
      - build/solc/

# -------------------------
# Basic repo hygiene checks 
# -------------------------
repo_hygiene:
  stage: quality
  image: alpine:3.20
  script:
    - test -f README.md
    - test -d src/contracts
    - test -f src/contracts/Zeph.sol
    # Ensure we are not committing remix VM state
    - if [ -d ".states" ] || [ -d "src/.states" ]; then echo "Remove committed .states folders"; exit 1; fi
  allow_failure: false
