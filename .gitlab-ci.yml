stages:
  - quality
  - build

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# -------------------------
# Compile Solidity in a container
# -------------------------
compile_solidity:
  stage: build
  image:
    name: ethereum/solc:0.8.20
    entrypoint: ["/bin/sh", "-lc"]
  script:
    - solc --version
    - mkdir -p build/solc
    # Compile everything under src/contracts into ABI + BIN
    - solc --optimize --abi --bin -o build/solc src/contracts/*.sol
    - ls -la build/solc
  artifacts:
    expire_in: 14 days
    paths:
      - build/solc/

# -------------------------
# Basic repo hygiene checks 
# -------------------------
repo_hygiene:
  stage: quality
  image: alpine:3.20
  script:
    - test -f README.md
    - test -d src/contracts
    - test -f src/contracts/Zeph.sol
    # Ensure we are not committing remix VM state
    - if [ -d ".states" ] || [ -d "src/.states" ]; then echo "Remove committed .states folders"; exit 1; fi
  allow_failure: false
